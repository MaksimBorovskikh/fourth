<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher Studio Pro</title>
    <style>
        :root { --primary: #6366f1; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 700px; background: var(--card); padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        select, textarea, input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; transition: border 0.2s; }
        select:focus, textarea:focus, input:focus { outline: none; border-color: var(--primary); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 1.5rem; }
        button { padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: transform 0.1s, opacity 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-encrypt { background: var(--primary); color: white; }
        .btn-decrypt { background: #10b981; color: white; }
        .result-area { margin-top: 2rem; background: #f8fafc; padding: 1.2rem; border-left: 4px solid var(--primary); border-radius: 4px; }
        #outputArea { margin: 0; word-break: break-all; font-family: monospace; white-space: pre-wrap; }
        #key-container { display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>Cipher Studio</h1>
    
    <div class="form-group">
        <label>袙褘斜械褉懈褌械 褕懈褎褉</label>
        <select id="cipherSelect" onchange="handleUI()">
            <option value="caesar">楔懈褎褉 笑械蟹邪褉褟 (小写胁懈谐)</option>
            <option value="vigenere">楔懈褎褉 袙懈卸械薪械褉邪</option>
            <option value="atbash">楔懈褎褉 袗褌斜邪褕邪</option>
            <option value="bacon">楔懈褎褉 袘褝泻芯薪邪 (6-bit RU)</option>
            <option value="morse">袗蟹斜褍泻邪 袦芯褉蟹械</option>
            <option value="gronsfeld">楔懈褎褉 袚褉芯薪褋褎械谢褜写邪</option>
            <option value="polybius">袣胁邪写褉邪褌 袩芯谢懈斜懈褟</option>
            <option value="playfair">楔懈褎褉 袩谢械泄褎械褉邪</option>
        </select>
    </div>

    <div class="form-group">
        <label>小芯芯斜褖械薪懈械</label>
        <textarea id="inputArea" rows="4" placeholder="袙胁械写懈褌械 褌械泻褋褌..."></textarea>
    </div>

    <div class="form-group" id="key-container">
        <label id="keyLabel">袣谢褞褔</label>
        <input type="text" id="cipherKey" placeholder="袙胁械写懈褌械 泻谢褞褔...">
    </div>

    <div class="controls">
        <button class="btn-encrypt" onclick="process(true)">袟邪褕懈褎褉芯胁邪褌褜</button>
        <button class="btn-decrypt" onclick="process(false)">袪邪褋褕懈褎褉芯胁邪褌褜</button>
    </div>

    <div class="result-area">
        <label>袪械蟹褍谢褜褌邪褌:</label>
        <p id="outputArea">...</p>
    </div>
</div>

<script>
    const alphabetRU = "袗袘袙袚袛袝衼袞袟袠袡袣袥袦袧袨袩袪小孝校肖啸笑效楔些歇蝎鞋协挟携";
    const morseDict = {
        "袗": ".-", "袘": "-...", "袙": ".--", "袚": "--.", "袛": "-..", "袝": ".", "衼": ".", "袞": "...-", "袟": "--..",
        "袠": "..", "袡": ".---", "袣": "-.-", "袥": ".-..", "袦": "--", "袧": "-.", "袨": "---", "袩": ".--.",
        "袪": ".-.", "小": "...", "孝": "-", "校": "..-", "肖": "..-.", "啸": "....", "笑": "-.-.", "效": "---.",
        "楔": "----", "些": "--.-", "歇": "--.--", "蝎": "-.--", "鞋": "-..-", "协": "..-..", "挟": "..--", "携": ".-.-",
        " ": "/"
    };

    function handleUI() {
        const type = document.getElementById('cipherSelect').value;
        const keyContainer = document.getElementById('key-container');
        const noKeyCiphers = ['atbash', 'bacon', 'morse', 'polybius'];
        
        keyContainer.style.display = noKeyCiphers.includes(type) ? 'none' : 'block';
    }

    function process(isEncrypt) {
        const type = document.getElementById('cipherSelect').value;
        const input = document.getElementById('inputArea').value.toUpperCase();
        const key = document.getElementById('cipherKey').value.toUpperCase();
        let result = "";

        switch(type) {
            case 'caesar': result = caesar(input, parseInt(key) || 0, isEncrypt); break;
            case 'vigenere': result = vigenere(input, key, isEncrypt); break;
            case 'atbash': result = atbash(input); break;
            case 'morse': result = isEncrypt ? toMorse(input) : fromMorse(input); break;
            case 'bacon': result = isEncrypt ? baconEnc(input) : baconDec(input); break;
            case 'gronsfeld': result = gronsfeld(input, key, isEncrypt); break;
            case 'polybius': result = polybius(input, isEncrypt); break;
            case 'playfair': result = playfair(input, key, isEncrypt); break;
        }
        document.getElementById('outputArea').innerText = result;
    }

    // --- LOGIC ---

    function caesar(text, shift, enc) {
        if (!enc) shift = (33 - (shift % 33)) % 33;
        return text.split('').map(c => {
            let i = alphabetRU.indexOf(c);
            return i === -1 ? c : alphabetRU[(i + shift) % 33];
        }).join('');
    }

    function atbash(text) {
        return text.split('').map(c => {
            let i = alphabetRU.indexOf(c);
            return i === -1 ? c : alphabetRU[32 - i];
        }).join('');
    }

    function toMorse(text) {
        return text.split('').map(c => morseDict[c] || '').join(' ');
    }

    function fromMorse(text) {
        const rev = Object.fromEntries(Object.entries(morseDict).map(([k,v]) => [v,k]));
        return text.trim().split(' ').map(c => rev[c] || '?').join('');
    }

    function baconEnc(text) {
        return text.split('').map(c => {
            let i = alphabetRU.indexOf(c);
            if(i === -1) return c;
            // 6-bit binary for Russian (0-32)
            return i.toString(2).padStart(6, '0').replace(/0/g, 'a').replace(/1/g, 'b');
        }).join(' ');
    }

    function baconDec(text) {
        return text.split(' ').map(c => {
            if(c.length !== 6) return c;
            let bin = c.replace(/a/g, '0').replace(/b/g, '1');
            return alphabetRU[parseInt(bin, 2)] || c;
        }).join('');
    }

    function vigenere(text, key, enc) {
        if(!key) return text;
        let res = "", ki = 0;
        for(let c of text) {
            let i = alphabetRU.indexOf(c);
            if(i===-1) { res+=c; continue; }
            let shift = alphabetRU.indexOf(key[ki % key.length]);
            let finalIdx = enc ? (i + shift) % 33 : (i - shift + 33) % 33;
            res += alphabetRU[finalIdx];
            ki++;
        }
        return res;
    }

    function gronsfeld(text, key, enc) {
        if(!key) return text;
        let res = "", ki = 0;
        for(let c of text) {
            let i = alphabetRU.indexOf(c);
            if(i===-1) { res+=c; continue; }
            let shift = parseInt(key[ki % key.length]) || 0;
            let finalIdx = enc ? (i + shift) % 33 : (i - shift + 33) % 33;
            res += alphabetRU[finalIdx];
            ki++;
        }
        return res;
    }

    function polybius(text, enc) {
        const grid = "袗袘袙袚袛袝衼袞袟袠袡袣袥袦袧袨袩袪小孝校肖啸笑效楔些歇蝎鞋协挟携012";
        if(enc) {
            return text.split('').map(c => {
                let i = grid.indexOf(c);
                return i === -1 ? c : (Math.floor(i/6)+1).toString() + (i%6+1).toString();
            }).join(' ');
        } else {
            return text.split(' ').map(c => {
                if(c.length!==2) return c;
                let idx = (parseInt(c[0])-1)*6 + (parseInt(c[1])-1);
                return grid[idx] || c;
            }).join('');
        }
    }

    function playfair(text, key, enc) {
        return "Playfair (RU) requires a 6x6 matrix. Use a keyword for complex pair-swapping.";
    }

    // Initialize UI
    handleUI();
</script>

</body>
</html>
